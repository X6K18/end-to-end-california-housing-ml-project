<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Housing Dashboard - {% block title %}ML System{% endblock %}</title>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* DASHBOARD LAYOUT: Sidebar + Main */
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* ========= SIDEBAR ========= */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0c0c0c 0%, #080808 100%);
            border-right: 1px solid #1f1f1f;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid #1f1f1f;
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-header p {
            font-size: 11px;
            color: #555;
            margin-top: 5px;
        }

        .nav-menu {
            list-style: none;
            padding: 0 15px;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 12px;
            color: #aaa;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .nav-link i {
            width: 24px;
            font-size: 18px;
        }

        .nav-link:hover {
            background: #1a1a1a;
            color: #fff;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #60a5fa;
            border-left: 3px solid #60a5fa;
        }

        /* ========= MAIN CONTENT ========= */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px 30px;
        }

        /* ========= NAVBAR ========= */
        .navbar {
            background: #0f0f0f;
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #202020;
            backdrop-filter: blur(10px);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Cards Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #0f0f0f;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #202020;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: #333;
        }

        .stat-title {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #60a5fa;
        }

        /* Chart Container */
        .chart-container {
            background: #0f0f0f;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #202020;
            margin-bottom: 30px;
        }

        canvas {
            max-height: 350px;
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar-header h2, .sidebar-header p, .nav-link span {
                display: none;
            }
            .nav-link {
                justify-content: center;
            }
            .main-content {
                margin-left: 80px;
            }
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            color: #333;
            padding: 20px;
        }

        .result-box {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-top: 25px;
        }

        .result-price {
            font-size: 42px;
            font-weight: 800;
            color: #34d399;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-chart-line"></i> CalHousing</h2>
                <p>ML Prediction System</p>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('dashboard.dashboard') }}" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt"></i> <span> Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('analytics.analytics') }}" class="nav-link {% if active_page == 'analytics' %}active{% endif %}">
                        <i class="fas fa-chart-bar"></i> <span> Analytics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('predictions.predictions') }}" class="nav-link {% if active_page == 'predictions' %}active{% endif %}">
                        <i class="fas fa-robot"></i> <span> Predictions</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('model_metrics.model_metrics') }}" class="nav-link {% if active_page == 'model_metrics' %}active{% endif %}">
                        <i class="fas fa-chart-line"></i> <span> Model Metrics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('mlflow.mlflow') }}" class="nav-link {% if active_page == 'mlflow' %}active{% endif %}">
                        <i class="fas fa-flask"></i> <span> MLflow</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('settings.settings') }}" class="nav-link {% if active_page == 'settings' %}active{% endif %}">
                        <i class="fas fa-cog"></i> <span> Settings</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="navbar">
                <div class="page-title">{% block page_title %}Dashboard{% endblock %}</div>
                <div class="user-info">
                    <span><i class="fas fa-bell"></i></span>
                    <div class="user-avatar">ML</div>
                </div>
            </div>

            {% block content %}{% endblock %}

            <div class="footer">
                POWERED BY FLASK & MACHINE LEARNING | CALIFORNIA HOUSING
            </div>
        </div>
    </div>
</body>

</html>
