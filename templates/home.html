<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California House Price Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login { background: white; padding: 30px; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        h1 { text-align: center; color: #333; font-size: 24px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .result { margin-top: 20px; text-align: center; font-weight: bold; color: #007bff; font-size: 18px; }
    </style>
</head>
<body>
    <div class="login">
        <h1>Housing Price Prediction</h1>

        <!-- Form gửi dữ liệu đến route /predict bằng phương thức POST -->
        <form action="{{ url_for('predict')}}" method="post">
            
            <label for="MedInc">Median Income</label>
            <input type="text" name="MedInc" placeholder="e.g. 3.5" required="required" />

            <label for="HouseAge">House Age</label>
            <input type="text" name="HouseAge" placeholder="e.g. 20" required="required" />

            <label for="AveRooms">Average Rooms</label>
            <input type="text" name="AveRooms" placeholder="e.g. 5.2" required="required" />

            <label for="AveBedrms">Average Bedrooms</label>
            <input type="text" name="AveBedrms" placeholder="e.g. 1.0" required="required" />

            <label for="Population">Population</label>
            <input type="text" name="Population" placeholder="e.g. 1200" required="required" />

            <label for="AveOccup">Average Occupancy</label>
            <input type="text" name="AveOccup" placeholder="e.g. 3.0" required="required" />

            <label for="Latitude">Latitude</label>
            <input type="text" name="Latitude" placeholder="e.g. 34.05" required="required" />

            <label for="Longitude">Longitude</label>
            <input type="text" name="Longitude" placeholder="e.g. -118.24" required="required" />

            <button type="submit">Predict Price</button>
        </form>

        <!-- Hiển thị kết quả dự đoán từ biến prediction_text trong Flask -->
        <div class="result">
            {{prediction_text}}
        </div>
    </div>
</body>
</html>
