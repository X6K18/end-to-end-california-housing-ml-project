<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dự đoán giá nhà California</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            padding: 40px; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Đã sửa lỗi shadow */
            width: 100%;
            max-width: 500px; 
        }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: border 0.3s;
        }
        input:focus { border-color: #1a73e8; outline: none; }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #1557b0; }
        .result { 
            margin-top: 25px; 
            text-align: center; 
            padding: 15px;
            background-color: #e8f0fe;
            border-radius: 6px;
            font-weight: bold; 
            color: #1a73e8; 
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>California Housing</h1>
        <form action="{{ url_for('predict')}}" method="post">
            <div class="form-group">
                <label>Median Income (Thu nhập TB)</label>
                <input type="number" step="any" name="MedInc" placeholder="Ví dụ: 3.87" required>
            </div>
            <div class="form-group">
                <label>House Age (Tuổi nhà)</label>
                <input type="number" step="any" name="HouseAge" placeholder="Ví dụ: 28" required>
            </div>
            <div class="form-group">
                <label>Average Rooms (Số phòng TB)</label>
                <input type="number" step="any" name="AveRooms" placeholder="Ví dụ: 5.4" required>
            </div>
            <div class="form-group">
                <label>Average Bedrooms (Phòng ngủ TB)</label>
                <input type="number" step="any" name="AveBedrms" placeholder="Ví dụ: 1.1" required>
            </div>
            <div class="form-group">
                <label>Population (Dân số khu vực)</label>
                <input type="number" step="any" name="Population" placeholder="Ví dụ: 1400" required>
            </div>
            <div class="form-group">
                <label>Average Occupancy (Số người/nhà)</label>
                <input type="number" step="any" name="AveOccup" placeholder="Ví dụ: 3.0" required>
            </div>
            <div class="form-group">
                <label>Latitude (Vĩ độ)</label>
                <input type="number" step="any" name="Latitude" placeholder="Ví dụ: 34.05" required>
            </div>
            <div class="form-group">
                <label>Longitude (Kinh độ)</label>
                <input type="number" step="any" name="Longitude" placeholder="Ví dụ: -118.24" required>
            </div>
            <button type="submit">Dự đoán ngay</button>
        </form>

        <div class="result">
            {% if prediction_text %}
                {{ prediction_text }}
            {% endif %}
        </div>
    </div>
</body>
</html>
